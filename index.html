<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge UI — Каталог паттернов</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EBEBEB;--surf:#FAFAFA;--el:#FFFFFF;
  --bd:#D8D8D8;--bdl:#EDEDED;
  --T:#A63D1F;--T6:#8F2E12;--T5:#FAF0EC;
  --O:#5A7D3E;--O5:#EBF3E5;
  --txt:#1A1A1A;--t2:#6B6B6B;--tm:#ABABAB;
  --fd:'DM Serif Display',serif;--fb:'Inter',sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
  --spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);min-height:100vh;}

/* HEADER */
.hdr{padding:48px 64px 0;max-width:1280px;margin:0 auto;}
.hdr-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;}
.logo{font-family:var(--fd);font-size:34px;font-weight:400;letter-spacing:-.02em;}
.logo em{color:var(--T);font-style:italic;}
.logo-s{font-size:13px;color:var(--tm);margin-top:4px;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.sw{display:flex;align-items:center;gap:8px;background:var(--el);border:1.5px solid var(--bd);
  border-radius:99px;padding:9px 16px;width:280px;transition:border-color 150ms,box-shadow 150ms;}
.sw:focus-within{border-color:var(--T);box-shadow:0 0 0 3px rgba(166,61,31,.12);}
.si{flex:1;font-family:var(--fb);font-size:13px;border:none;outline:none;
  background:transparent;color:var(--txt);}
.si::placeholder{color:var(--tm);}
.cnt{display:inline-flex;align-items:center;font-size:13px;color:var(--t2);
  background:var(--surf);border:1px solid var(--bd);padding:8px 14px;border-radius:99px;}
.cnt strong{color:var(--T);margin-right:4px;}

/* CATALOG */
.cat{max-width:1280px;margin:0 auto;padding:36px 64px 80px;}
.grp-lbl{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.grp-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--T);background:var(--T5);border:1px solid rgba(166,61,31,.2);padding:3px 9px;border-radius:4px;}
.grp-cnt{font-size:13px;color:var(--tm);font-weight:500;}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* CARD */
.pc{background:var(--el);border:1px solid var(--bd);border-radius:16px;overflow:hidden;
  cursor:pointer;position:relative;
  transition:box-shadow 220ms var(--ease),transform 220ms var(--ease),border-color 150ms;}
.pc:hover{box-shadow:0 8px 28px rgba(0,0,0,.12);transform:translateY(-3px);border-color:var(--T);}
/* Preview: 16:9 ratio to match slide proportions */
.pp{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;background:var(--bg);}
.pp iframe{width:400%;height:400%;transform:scale(.25);transform-origin:top left;
  border:none;pointer-events:none;}
.fav{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.92);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:opacity 150ms,background 150ms;z-index:2;}
.pc:hover .fav{opacity:1;}
.fav:hover{background:var(--T5);border-color:var(--T);}
.fav.on svg{fill:var(--T);stroke:var(--T);}
.pf{padding:14px 16px;border-top:1px solid var(--bdl);}
.pid{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--T);margin-bottom:3px;}
.pname{font-family:var(--fd);font-size:16px;font-weight:400;letter-spacing:-.01em;margin-bottom:2px;}
.pdesc{font-size:12px;color:var(--t2);}
.pc.hidden{display:none;}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 250ms var(--ease);}
.mov.open{opacity:1;pointer-events:all;}
.modal{
  /* 16:9 aspect — scaled to fit screen */
  width:min(92vw, calc(92vh * 16/9));
  height:min(calc(92vw * 9/16), 92vh);
  background:var(--el);border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  transform:scale(.94) translateY(16px);
  transition:transform 300ms var(--spring);
}
.mov.open .modal{transform:scale(1) translateY(0);}
.mtb{display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--surf);}
.mtb-l{display:flex;align-items:center;gap:12px;}
.mid{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--T);}
.mname{font-family:var(--fd);font-size:17px;font-weight:400;letter-spacing:-.01em;}
.mtb-r{display:flex;align-items:center;gap:8px;}
.mbtn{display:inline-flex;align-items:center;gap:6px;font-family:var(--fb);font-size:12px;
  font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;border:none;transition:all 150ms;}
.mb-g{background:transparent;color:var(--t2);border:1px solid var(--bd);}
.mb-g:hover{background:var(--bg);color:var(--txt);}
.mb-p{background:var(--T);color:#fff;}
.mb-p:hover{background:var(--T6);}
.mcl{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all 150ms;}
.mcl:hover{background:var(--bg);}
.mbody{flex:1;overflow:hidden;position:relative;}
.mbody iframe{width:100%;height:100%;border:none;}
.mnav{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;
  background:var(--el);border:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.1);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 150ms;z-index:10;}
.mnav:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-50%) scale(1.06);}
.mnav-p{left:12px;}
.mnav-n{right:12px;}

/* FULLSCREEN */
.fsov{position:fixed;inset:0;background:#0a0a0a;z-index:2000;display:none;
  flex-direction:column;}
.fsov.open{display:flex;}

/* slide stage */
.fs-stage{ flex:1; position:relative; overflow:hidden; background:#0a0a0a; }

.fs-slot{
  position:absolute; inset:0; overflow:hidden; pointer-events:none;
  /* transition duration/easing controlled by JS via CSS vars */
}
.fs-slot.active { pointer-events:all; }
.fs-slot iframe { display:block; flex-shrink:0; }

/* ── FADE ── */
.fs-slot.fade-idle    { opacity:0; transform:none; }
.fs-slot.fade-enter   { opacity:0; transform:none; transition:opacity 500ms ease; }
.fs-slot.fade-active  { opacity:1; transform:none; transition:opacity 500ms ease; }
.fs-slot.fade-exit    { opacity:0; transform:none; transition:opacity 500ms ease; }

/* ── ZOOM ── */
.fs-slot.zoom-idle    { opacity:0; transform:scale(1.06); }
.fs-slot.zoom-enter   { opacity:0; transform:scale(1.06); transition:opacity 500ms ease,transform 500ms cubic-bezier(0.16,1,0.3,1); }
.fs-slot.zoom-active  { opacity:1; transform:scale(1);    transition:opacity 500ms ease,transform 500ms cubic-bezier(0.16,1,0.3,1); }
.fs-slot.zoom-exit    { opacity:0; transform:scale(0.96); transition:opacity 400ms ease,transform 400ms ease; }

/* ── REVEAL (curtain from top) ── */
.fs-slot.reveal-idle   { clip-path:inset(0 0 100% 0); }
.fs-slot.reveal-enter  { clip-path:inset(0 0 100% 0); transition:clip-path 550ms cubic-bezier(0.16,1,0.3,1); }
.fs-slot.reveal-active { clip-path:inset(0 0 0% 0);   transition:clip-path 550ms cubic-bezier(0.16,1,0.3,1); }
.fs-slot.reveal-exit   { opacity:0; clip-path:inset(0 0 0% 0); transition:opacity 300ms ease 200ms; }

/* ── MORPH (current goes down, new comes from top) ── */
.fs-slot.morph-idle    { opacity:0; transform:translateY(-40px); }
.fs-slot.morph-enter   { opacity:0; transform:translateY(-40px); transition:opacity 480ms ease,transform 480ms cubic-bezier(0.16,1,0.3,1); }
.fs-slot.morph-active  { opacity:1; transform:translateY(0);     transition:opacity 480ms ease,transform 480ms cubic-bezier(0.16,1,0.3,1); }
.fs-slot.morph-exit    { opacity:0; transform:translateY(40px);  transition:opacity 380ms ease,transform 380ms ease; }

/* bottom bar */
.fs-bar{
  flex-shrink:0; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px;
  background:rgba(255,255,255,.04);
  border-top:1px solid rgba(255,255,255,.07);
}
.fs-bar-left{display:flex;align-items:center;gap:16px;}
.fs-id{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#A63D1F;font-family:var(--fb);}
.fs-name{font-family:var(--fd);font-size:18px;color:rgba(255,255,255,.85);}
.fs-bar-center{display:flex;align-items:center;gap:8px;}
.fs-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);
  cursor:pointer;transition:all 200ms;}
.fs-dot.on{background:#A63D1F;transform:scale(1.3);}
.fs-bar-right{display:flex;align-items:center;gap:10px;}

/* nav arrows */
.fs-nav{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 180ms;
}
.fs-nav:hover{background:rgba(255,255,255,.16);color:#fff;}

/* close button */
.fs-close-btn{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.7);border-radius:8px;
  padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;
  font-family:var(--fb);transition:all 180ms;
}
.fs-close-btn:hover{background:rgba(255,255,255,.16);color:#fff;}

/* transition mode picker */
.fs-modes{display:flex;align-items:center;gap:4px;margin-right:4px;}
.fs-mode{
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:5px 11px;border-radius:6px;cursor:pointer;
  background:transparent;border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.35);font-family:var(--fb);transition:all 180ms;
}
.fs-mode:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.3);}
.fs-mode.on{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.3);}
</style>
</head>

      </button>
      <button class="mnav mnav-n" onclick="nav(1)">

      </button>
    </div>
  </div>
</div>

<!-- FULLSCREEN -->
<div class="fsov" id="fsov">
  <div class="fs-stage" id="fs-stage">
    <div class="fs-slot active" id="fs-slot-a">
      <iframe id="fs-if-a" srcdoc="" frameborder="0"></iframe>
    </div>
    <div class="fs-slot" id="fs-slot-b">
      <iframe id="fs-if-b" srcdoc="" frameborder="0"></iframe>
    </div>
  </div>
  <div class="fs-bar">

      </div>

        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="fs-close-btn" onclick="closeFS()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        Выйти
      </button>
    </div>
  </div>
</div>

let cur = 0;

// ── BUILD GRID ──
function buildGrid() {
  const g = document.getElementById('grid');
  slides.forEach((s,i) => {
    const c = document.createElement('div');
    c.className = 'pc';
    c.dataset.id = s.id; c.dataset.name = s.name; c.dataset.desc = s.desc;
    c.onclick = () => openM(i);
    c.innerHTML = `
      <div class="pp" id="pp${i}"></div>
      <button class="fav" onclick="fav(event,this)">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </button>
      <div class="pf">
        <div class="pid">${s.id}</div>
        <div class="pname">${s.name}</div>
        <div class="pdesc">${s.desc}</div>
      </div>`;
    g.appendChild(c);
  });
}

// ── LAZY PREVIEWS ──
function initPreviews() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting || e.target.dataset.done) return;
      e.target.dataset.done = '1';
      const i = +e.target.id.replace('pp','');
      const fr = document.createElement('iframe');
      fr.srcdoc = slides[i].html;
      fr.scrolling = 'no';
      fr.style.cssText = 'width:400%;height:400%;transform:scale(.25);transform-origin:top left;border:none;pointer-events:none;';
      e.target.appendChild(fr);
      obs.unobserve(e.target);
    });
  }, {rootMargin:'300px'});
  document.querySelectorAll('[id^="pp"]').forEach(el => obs.observe(el));
}

// ── MODAL ──
function openM(i) {
  cur = i;
  updM();
  document.getElementById('mov').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updM() {
  const s = slides[cur];
  document.getElementById('mid').textContent = s.id;
  document.getElementById('mname').textContent = s.name;
  document.getElementById('mif').srcdoc = s.html;
}
function closeM() {
  document.getElementById('mov').classList.remove('open');
  document.body.style.overflow = '';
}
function ovClick(e) { if (e.target===document.getElementById('mov')) closeM(); }
function nav(d) { cur=(cur+d+slides.length)%slides.length; updM(); }

// ── FULLSCREEN ──────────────────────────────────────────────────
let fsActive = 'a';
let fsAnimating = false;
let fsMode = 'fade'; // fade | zoom | reveal | morph

function setFsMode(mode, btn) {
  fsMode = mode;
  document.querySelectorAll('.fs-mode').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function fsApplySize(iframe) {
  const vw = window.innerWidth;
  const vh = window.innerHeight - 60;
  const scale = Math.min(vw / 1920, vh / 1080);
  const vfw = Math.round(1920 * scale);
  const vfh = Math.round(1080 * scale);
  iframe.style.width           = '1920px';
  iframe.style.height          = '1080px';
  iframe.style.transform       = `scale(${scale})`;
  iframe.style.transformOrigin = 'top left';
  iframe.style.display         = 'block';
  iframe.style.flexShrink      = '0';
  iframe.style.marginLeft = ((vw  - vfw) / 2) + 'px';
  iframe.style.marginTop  = ((vh  - vfh) / 2) + 'px';
  const slot = iframe.parentElement;
  slot.style.position = 'absolute';
  slot.style.inset    = '0';
  slot.style.width    = '';
  slot.style.height   = '';
  slot.style.overflow = 'hidden';
}

function fsBuildDots() {
  const wrap = document.getElementById('fs-dots');
  wrap.innerHTML = '';
  slides.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'fs-dot' + (i === cur ? ' on' : '');
    d.onclick = () => { if (i !== cur) fsGoTo(i); };
    wrap.appendChild(d);
  });
}

function fsUpdateMeta() {
  const s = slides[cur];
  document.getElementById('fs-id').textContent   = s.id;
  document.getElementById('fs-name').textContent = s.name;
  document.querySelectorAll('.fs-dot').forEach((d,i) => d.classList.toggle('on', i===cur));
}

function goFS() {
  closeM();
  fsActive = 'a';
  const ifA = document.getElementById('fs-if-a');
  const ifB = document.getElementById('fs-if-b');
  const slA = document.getElementById('fs-slot-a');
  const slB = document.getElementById('fs-slot-b');

  slA.className = `fs-slot ${fsMode}-active active`;
  slB.className = `fs-slot ${fsMode}-idle`;
  fsApplySize(ifA);
  fsApplySize(ifB);
  ifA.srcdoc = slides[cur].html;
  ifB.srcdoc = '';

  fsBuildDots();
  fsUpdateMeta();
  document.getElementById('fsov').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function fsNav(dir) {
  if (fsAnimating) return;
  const next = (cur + dir + slides.length) % slides.length;
  fsGoTo(next, dir);
}

// Duration per mode (ms) — used for cleanup timeout
const fsDuration = { fade:520, zoom:520, reveal:580, morph:500 };

function fsGoTo(next, dir) {
  if (fsAnimating || next === cur) return;
  if (dir === undefined) dir = next > cur ? 1 : -1;
  fsAnimating = true;

  const m = fsMode;
  const incoming = fsActive === 'a' ? 'b' : 'a';
  const outgoing  = fsActive;

  const slIn  = document.getElementById('fs-slot-' + incoming);
  const slOut = document.getElementById('fs-slot-' + outgoing);
  const ifIn  = document.getElementById('fs-if-' + incoming);

  cur = next;
  ifIn.srcdoc = slides[cur].html;
  fsApplySize(ifIn);
  fsUpdateMeta();

  // Set incoming to start state (no transition yet)
  slIn.className = `fs-slot ${m}-enter`;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // Trigger transition to active
      slIn.className  = `fs-slot ${m}-active active`;
      // Trigger exit on outgoing
      slOut.className = `fs-slot ${m}-exit`;

      fsActive = incoming;

      setTimeout(() => {
        slOut.className = `fs-slot ${m}-idle`;
        document.getElementById('fs-if-' + outgoing).srcdoc = '';
        fsAnimating = false;
      }, fsDuration[m] + 60);
    });
  });
}

function closeFS() {
  document.getElementById('fsov').classList.remove('open');
  document.body.style.overflow = '';
  fsAnimating = false;
}

window.addEventListener('resize', () => {
  if (!document.getElementById('fsov').classList.contains('open')) return;
  fsApplySize(document.getElementById('fs-if-a'));
  fsApplySize(document.getElementById('fs-if-b'));
});

// ── COPY HTML ──
function copyHTML() {
  navigator.clipboard.writeText(slides[cur].html).then(() => {
    const btn = document.querySelector('.mb-g');
    const orig = btn.innerHTML;
    btn.textContent = '✓ Скопировано';
    btn.style.color = '#5A7D3E';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color=''; }, 2000);
  });
}

// ── FAV ──
function fav(e,btn) { e.stopPropagation(); btn.classList.toggle('on'); }

// ── SEARCH ──
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  let n = 0;
  document.querySelectorAll('.pc').forEach(c => {
    const ok = !q || c.dataset.id.toLowerCase().includes(q)
               || c.dataset.name.toLowerCase().includes(q)
               || c.dataset.desc.toLowerCase().includes(q);
    c.classList.toggle('hidden', !ok);
    if(ok) n++;
  });
  document.getElementById('vcnt').textContent = n;
  document.getElementById('gcnt').textContent = n + ' паттернов';
});

// ── KEYS ──
document.addEventListener('keydown', e => {
  const mOpen = document.getElementById('mov').classList.contains('open');
  const fOpen = document.getElementById('fsov').classList.contains('open');
  if (e.key==='Escape') { if(fOpen) closeFS(); else if(mOpen) closeM(); }
  if (e.key==='ArrowRight') { if(fOpen) fsNav(1);  else if(mOpen) nav(1);  }
  if (e.key==='ArrowLeft')  { if(fOpen) fsNav(-1); else if(mOpen) nav(-1); }
});

buildGrid();
initPreviews();
</script>
